<div class="flex flex-col gap-2 w-full">
  <label [for]="tabs.id()" class="text-surface-900 dark:text-surface-0 font-medium leading-normal">{{
    label()
  }}</label>

  <p-tabs #tabs [(value)]="currentTab">
    <p-tablist>
      @for (lang of languages; track $index) {
        <p-tab [value]="lang">{{ lang | uppercase }}</p-tab>
      }
    </p-tablist>

    <p-tabpanels [pt]="{ root: { class: 'px-0' } }">
      @for (lang of languages; track lang) {
        <p-tabpanel [value]="lang">
          <input
            pInputText
            type="text"
            class="w-full px-3 py-2 shadow-sm rounded-lg"
            [id]="tabs.id() + '-' + lang"
            [formField]="languageForm[lang]"
            [placeholder]="label()"
            [class.ng-invalid]="languageForm[lang]().touched() && languageForm[lang]().invalid()"
          />
        </p-tabpanel>
      }
    </p-tabpanels>
  </p-tabs>

  @if (invalid()) {
    <p-message severity="error" size="small" variant="simple">One or more translations are missing</p-message>
  }
</div>
